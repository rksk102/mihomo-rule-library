name: "3. Convert to MRS"

on:
  workflow_dispatch:

jobs:
  convert-job:
    name: "🦄 Convert & Compile"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Scripts & Rules
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⬇️ Install Python Deps
        run: pip install -r requirements.txt

      - name: 🚀 Run Conversion Script
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python -u scripts/convert_mrs.py

      - name: 📤 Upload Result (MRS)
        uses: actions/upload-artifact@v4
        with:
          name: mrs_rules_artifact
          path: merged-rules-mrs/
          retention-days: 1

      - name: 💾 Commit & Push to Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-generated MRS rules [skip ci]"
          file_pattern: merged-rules-mrs/
          branch: main
          skip_dirty_check: false
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
