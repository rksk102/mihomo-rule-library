name: "1. Manage Rules: Sync & Sanitize"

on:
  workflow_dispatch:
    inputs:
      strict_mode:
        description: 'Strict Mode (Stop immediately on error)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: sync-rules
  cancel-in-progress: true

jobs:
  sync-manager:
    name: "🛡️ Sync & Sanitize Rules"
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Initialize Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Execute Python Sync
        id: run_sync
        env:
          STRICT_MODE: ${{ inputs.strict_mode }}
          PYTHONPATH: ${{ github.workspace }}/scripts
          TERM: xterm-color
        run: python scripts/main.py
