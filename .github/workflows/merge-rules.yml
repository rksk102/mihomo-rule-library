name: "2. Merge Rules based on Config"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    name: "🧩 Merge & Validate"
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Check File Structure (Debug)
        run: |
          echo "=== Listing rulesets directory ==="
          ls -R rulesets/
          echo "=================================="

      - name: 🚀 Run Merger
        id: merger
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          TERM: xterm-color
        run: python scripts/merger.py

      - name: 💾 Commit & Push
        if: success()
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          
          # 强制添加 merged-rules 目录
          git add merged-rules/
          
          echo "### 💾 Git Operations" >> $GITHUB_STEP_SUMMARY
          
          if git diff-index --quiet HEAD; then
             echo "::notice::No changes detected."
             echo "- ✅ **Status**: No changes to commit." >> $GITHUB_STEP_SUMMARY
          else
             CHANGE_COUNT=$(git diff --name-only --cached | wc -l)
             COMMIT_MSG="build: 🧩 Re-merged $CHANGE_COUNT lists (Strict Structure)"
             
             git commit -m "$COMMIT_MSG"
             git push
             
             echo "- 🚀 **Pushed**: $CHANGE_COUNT files changed." >> $GITHUB_STEP_SUMMARY
             echo "- 📝 **Commit**: $COMMIT_MSG" >> $GITHUB_STEP_SUMMARY
          fi
