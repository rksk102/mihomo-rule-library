name: "4. Generate README"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: "📝 Update Documentation"
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: � Install Dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Generate README
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/gen_readme.py

      - name: 💾 Commit & Push
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          
          # 检查是否有变动，避免空提交
          if [[ -n $(git status -s README.md) ]]; then
            git add README.md
            git commit -m "docs: update README with latest rules [skip ci]"
            git push
          else
            echo "::notice::README is up to date."
          fi
