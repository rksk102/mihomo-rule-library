name: "规则构建流水线"

on:
  schedule:
    - cron: '0 19 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      strict_mode:
        description: '严格模式（任何源失败则终止）'
        type: boolean
        default: false
      skip_release:
        description: '跳过 Release 发布'
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-rules:
    name: "1. 同步清洗"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: 运行同步
        env:
          STRICT_MODE: ${{ inputs.strict_mode || 'false' }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/main.py

  merge-rules:
    name: "2. 合并规则"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: sync-rules
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: 运行合并
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/merger.py
      - name: 提交合并结果
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(merge): 合并规则 [skip ci]"
          file_pattern: merged-rules/
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  convert-mrs:
    name: "3. 转换 MRS"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: merge-rules
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: 缓存 Mihomo 内核
        uses: actions/cache@v4
        with:
          path: .cache/mihomo-kernel
          key: mihomo-${{ runner.os }}-v1
          restore-keys: mihomo-${{ runner.os }}-
      - name: 转换规则集
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python -u scripts/convert_mrs.py
      - name: 提交 MRS 文件
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(mrs): 自动生成 MRS 规则 [skip ci]"
          file_pattern: merged-rules-mrs/
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  gen-readme:
    name: "4. 生成 README"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: convert-mrs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-python-env
      - name: 生成 README
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/gen_readme.py
      - name: 提交 README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 更新 README [skip ci]"
          file_pattern: README.md
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  create-release:
    name: "5. 发布 Release"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: gen-readme
    if: ${{ inputs.skip_release != true }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - name: 发布 Release
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/release_handler.py
