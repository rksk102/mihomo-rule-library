name: "规则构建流水线"

on:
  schedule:
    - cron: '0 19 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      strict_mode:
        description: '严格模式（任何源失败则终止）'
        type: boolean
        default: false
      skip_release:
        description: '跳过 Release 发布'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-rules:
    name: "1. 同步清洗"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: 缓存 ETag
        uses: actions/cache@v5
        with:
          path: .cache/etag_cache.json
          key: etag-${{ github.run_id }}
          restore-keys: etag-
      - name: 安装 Python 环境
        uses: ./.github/actions/setup-python-env
      - name: 运行同步
        env:
          STRICT_MODE: ${{ inputs.strict_mode || 'false' }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/main.py
      - name: 上传 rulesets 产物
        uses: actions/upload-artifact@v7
        with:
          name: rulesets
          path: rulesets/
          retention-days: 1

  merge-rules:
    name: "2. 合并规则"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: sync-rules
    steps:
      - uses: actions/checkout@v6
      - name: 安装 Python 环境
        uses: ./.github/actions/setup-python-env
      - name: 下载 rulesets 产物
        uses: actions/download-artifact@v7
        with:
          name: rulesets
          path: rulesets/
      - name: 运行合并
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/merger.py
      - name: 上传 merged-rules 产物
        uses: actions/upload-artifact@v7
        with:
          name: merged-rules
          path: merged-rules/
          retention-days: 1

  convert-mrs:
    name: "3. 转换 MRS"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: merge-rules
    steps:
      - uses: actions/checkout@v6
      - name: 安装 Python 环境
        uses: ./.github/actions/setup-python-env
      - name: 下载 merged-rules 产物
        uses: actions/download-artifact@v7
        with:
          name: merged-rules
          path: merged-rules/
      - name: 缓存 Mihomo 内核
        uses: actions/cache@v5
        with:
          path: .cache/mihomo-kernel
          key: mihomo-${{ runner.os }}-v1
          restore-keys: mihomo-${{ runner.os }}-
      - name: 转换规则集
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python -u scripts/convert_mrs.py
      - name: 上传 merged-rules-mrs 产物
        uses: actions/upload-artifact@v7
        with:
          name: merged-rules-mrs
          path: merged-rules-mrs/
          retention-days: 1

  publish:
    name: "4. 发布"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: convert-mrs
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 安装 Python 环境
        uses: ./.github/actions/setup-python-env
      - name: 下载 merged-rules 产物
        uses: actions/download-artifact@v7
        with:
          name: merged-rules
          path: merged-rules/
      - name: 下载 merged-rules-mrs 产物
        uses: actions/download-artifact@v7
        with:
          name: merged-rules-mrs
          path: merged-rules-mrs/
      - name: 生成 README
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/gen_readme.py
      - name: 提交并推送所有产物
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged-rules/ merged-rules-mrs/ README.md
          git commit -m "chore: 自动更新规则与 README [skip ci]" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push
      - name: 发布 Release
        if: ${{ inputs.skip_release != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: ${{ github.workspace }}/scripts
        run: python scripts/release_handler.py
